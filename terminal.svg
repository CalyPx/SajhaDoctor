<svg width="700" height="375" viewBox="0 0 700 375" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .m  { font-family:'Courier New',Courier,monospace; font-size:14px; }
  .sm { font-family:'Courier New',Courier,monospace; font-size:12px; }
  .p  { fill:#6EF7F7; }
  .d  { fill:#9580FF; }
  .c  { fill:#E6EDF3; }
  .o  { fill:#8B949E; }
  .s  { fill:#3FB950; }
  .v  { fill:#E3B341; }
  .f  { fill:#79C0FF; }
  .r  { fill:#F85149; }

  .l1  { animation:ap .01s  0.4s  both; }
  .l2  { animation:ap .01s  1.6s  both; }
  .l3  { animation:ap .01s  2.5s  both; }
  .l4  { animation:ap .01s  3.3s  both; }
  .l5  { animation:ap .01s  5.0s  both; }
  .l6  { animation:ap .01s  5.9s  both; }
  .l7  { animation:ap .01s  7.0s  both; }
  .l8  { animation:ap .01s  8.1s  both; }
  .l9  { animation:ap .01s  8.9s  both; }
  .l10 { animation:ap .01s  9.7s  both; }
  .l11 { animation:ap .01s 10.4s  both; }
  .l12 { animation:ap .01s 11.2s  both; }
  .cur { animation:bl 1s   11.5s  infinite; opacity:0; }

  @keyframes ap { from { opacity:0; } to { opacity:1; } }
  @keyframes bl { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
</style>
</defs>

<!-- Window -->
<rect width="700" height="375" rx="10" fill="#0D1117"/>

<!-- Title bar -->
<rect width="700" height="40" rx="10" fill="#161B22"/>
<rect x="0" y="28" width="700" height="12" fill="#161B22"/>

<!-- Traffic lights -->
<circle cx="22" cy="20" r="6" fill="#FF5F57"/>
<circle cx="44" cy="20" r="6" fill="#FFBD2E"/>
<circle cx="66" cy="20" r="6" fill="#28CA41"/>

<!-- Window title -->
<text x="350" y="25" text-anchor="middle" font-family="Courier New,monospace" font-size="12" fill="#484F58">bash — rohit@dev — 700x375</text>

<!-- ── SECTION 1 : Earthquake Prediction ─────────────────────── -->

<!-- L1 -->
<text class="m l1" y="66">
  <tspan x="16" class="p">rohit@dev</tspan><tspan class="o">:</tspan><tspan class="d">~/ml-projects</tspan><tspan class="p"> $ </tspan><tspan class="c">python earthquake_predict.py</tspan>
</text>

<!-- L2 -->
<text class="m l2" y="90">
  <tspan x="28" class="o">Loading </tspan><tspan class="v">260,000</tspan><tspan class="o"> building records from 2015 Gorkha earthquake...</tspan>
</text>

<!-- L3 -->
<text class="m l3" y="114">
  <tspan x="28" class="o">Preprocessing: age, height, foundation_type, geo_level...</tspan>
</text>

<!-- L4: progress bar using block chars -->
<text class="m l4" y="138">
  <tspan x="28" class="o">Training XGBoost  </tspan><tspan class="s">█████████████████████</tspan><tspan class="v">  100%</tspan>
</text>

<!-- L5 -->
<text class="m l5" y="162">
  <tspan x="28" class="o">Accuracy: </tspan><tspan class="v">94.2%</tspan><tspan class="o">   F1-Score: </tspan><tspan class="v">0.93</tspan><tspan class="o">   AUC-ROC: </tspan><tspan class="v">0.97</tspan>
</text>

<!-- L6 -->
<text class="m l6" y="186">
  <tspan x="28" class="s">&#x2713; Model saved  </tspan><tspan class="o">&#x2192;</tspan><tspan class="f">  earthquake_model.pkl</tspan>
</text>

<!-- ── SECTION 2 : IoT Monitor ───────────────────────────────── -->

<!-- L7 -->
<text class="m l7" y="222">
  <tspan x="16" class="p">rohit@dev</tspan><tspan class="o">:</tspan><tspan class="d">~/iot-projects</tspan><tspan class="p"> $ </tspan><tspan class="c">python iot_monitor.py</tspan>
</text>

<!-- L8 -->
<text class="m l8" y="246">
  <tspan x="28" class="o">Arduino detected on </tspan><tspan class="v">/dev/ttyUSB0</tspan><tspan class="o">  @  </tspan><tspan class="v">9600 baud</tspan>
</text>

<!-- L9 -->
<text class="m l9" y="270">
  <tspan x="28" class="o">Temp: </tspan><tspan class="v">24.5&#xB0;C</tspan><tspan class="o">   Humidity: </tspan><tspan class="v">68 %</tspan><tspan class="o">   Air Quality: </tspan><tspan class="s">GOOD</tspan>
</text>

<!-- L10 -->
<text class="m l10" y="294">
  <tspan x="28" class="o">PIR Sensor: </tspan><tspan class="s">ACTIVE</tspan><tspan class="o">   Light: </tspan><tspan class="v">420 lux</tspan><tspan class="o">   Relay: </tspan><tspan class="s">ON</tspan>
</text>

<!-- L11 -->
<text class="m l11" y="318">
  <tspan x="28" class="s">&#x2713; Smart residence running — all sensors nominal</tspan>
</text>

<!-- L12 : idle prompt with blinking cursor -->
<text class="m l12" y="352">
  <tspan x="16" class="p">rohit@dev</tspan><tspan class="o">:</tspan><tspan class="d">~/iot-projects</tspan><tspan class="p"> $ </tspan><tspan class="cur">&#x2588;</tspan>
</text>

</svg>
